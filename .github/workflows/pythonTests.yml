name: Long test
on:
  workflow_dispatch:
  push:
    branches-ignore:
      - 'gh-pages'
  pull_request:
    branches-ignore:
      - 'gh-pages'
jobs:
  pytest:
    runs-on: ubuntu-22.04
    strategy:
      max-parallel: 8
      matrix:
        python-version:
          - "3.7"
          - "3.8"
          - "3.9"
          - "3.10"
          - "pypy-3.10"
          - "3.11"
          - "3.12"
          - "3.13-dev"
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dev dependencies
      run: |
        python -m pip install .[dev]
    - name: Run long test
      run: python tests/test_error.py

